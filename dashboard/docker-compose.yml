services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - API_URL=${API_URL:-http://coordinator:3000}
    ports:
      - "${DASHBOARD_PORT:-8080}:80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - reconmc_default

networks:
  reconmc_default:
    external: true
